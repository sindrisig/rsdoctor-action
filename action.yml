name: '@yifancong/bundle-action'
description: 'A simple demo for checking compressed size differences'
branding:
  icon: 'archive'
  color: 'purple'
inputs:
  github_token:
    description: 'The GITHUB_TOKEN secret'
    required: false
    default: ${{ github.token }}
  file_path:
    description: 'Path to the file to upload (relative to project root)'
    required: true
  target_branch:
    description: 'The target branch to compare against (defaults to main)'
    required: false
    default: 'main'
  dispatch_target_branch:
    description: 'Override target branch when triggered by workflow_dispatch'
    required: false
    default: ''
    type: string
  ai_model:
    description: 'AI model to use for degradation analysis (e.g. claude-3-5-haiku-latest, gpt-4o-mini, qwen-plus). Provider is auto-detected from the model name prefix.'
    required: false
    default: 'claude-3-5-haiku-latest'
  ai_base_url:
    description: 'Custom base URL for AI API (e.g. https://dashscope.aliyuncs.com/compatible-mode/v1 for Qwen). Defaults to official endpoints.'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'